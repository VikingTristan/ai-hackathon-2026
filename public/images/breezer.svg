<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Breezer logo - tropical vibrant colors -->
  <defs>
    <radialGradient id="breezerGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF6B9D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C51162;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF176;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#FFB300;stop-opacity:0.9" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#breezerGrad)"/>

  <!-- Decorative wave -->
  <path d="M 20 120 Q 50 100, 80 120 T 140 120 T 180 120" stroke="url(#waveGrad)" stroke-width="4" fill="none" opacity="0.6"/>
  <path d="M 20 140 Q 50 120, 80 140 T 140 140 T 180 140" stroke="url(#waveGrad)" stroke-width="4" fill="none" opacity="0.4"/>

  <!-- Breezer text -->
  <text x="100" y="75" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Breezer</text>

  <!-- Tagline -->
  <text x="100" y="100" font-family="Arial, sans-serif" font-size="12" fill="#FFF9C4" text-anchor="middle">Taste the Breeze</text>

  <!-- Decorative elements -->
  <circle cx="40" cy="40" r="6" fill="#FFEB3B" opacity="0.7"/>
  <circle cx="160" cy="50" r="8" fill="#FFF176" opacity="0.6"/>
  <circle cx="170" cy="160" r="7" fill="#FFD54F" opacity="0.8"/>
  <circle cx="30" cy="170" r="9" fill="#FFF59D" opacity="0.7"/>
</svg>
