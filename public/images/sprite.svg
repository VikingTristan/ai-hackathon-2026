<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Sprite logo - green and yellow theme -->
  <defs>
    <radialGradient id="spriteGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B5E20;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#E8F5E9;stop-opacity:0.4" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#spriteGrad)"/>

  <!-- Sprite text -->
  <text x="100" y="85" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFEB3B" text-anchor="middle">Sprite</text>

  <!-- Tagline -->
  <text x="100" y="115" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">Obey Your Thirst</text>

  <!-- Bubbles -->
  <circle cx="50" cy="50" r="8" fill="url(#bubbleGrad)" opacity="0.7"/>
  <circle cx="150" cy="60" r="6" fill="url(#bubbleGrad)" opacity="0.6"/>
  <circle cx="140" cy="140" r="10" fill="url(#bubbleGrad)" opacity="0.8"/>
  <circle cx="60" cy="150" r="7" fill="url(#bubbleGrad)" opacity="0.7"/>
  <circle cx="180" cy="100" r="5" fill="url(#bubbleGrad)" opacity="0.5"/>
  <circle cx="30" cy="110" r="6" fill="url(#bubbleGrad)" opacity="0.6"/>
</svg>
